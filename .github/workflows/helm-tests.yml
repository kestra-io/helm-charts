name: Helm tests

permissions:
  contents: read

on:
  pull_request: {}
  push:
    branches:
      - master
      - main

jobs:
  tests-helm-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Regenerate Helm docs
        uses: losisin/helm-docs-github-action@v1
        with:
          git-push: false
      - name: Check for changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Helm chart documentation is out of date. Please run helm-docs locally and commit the changes."
            git status --porcelain
            exit 1
          else
            echo "Helm chart documentation is up to date."
          fi
  tests-image-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if appVersion image exists
        id: check_image
        run: |
          APP_VERSION=$(grep '^appVersion:' charts/kestra/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "Detected appVersion: $APP_VERSION"
          IMAGE_NAME="kestra/kestra"
          echo "Checking if image $IMAGE_NAME:$APP_VERSION exists on Docker Hub..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${APP_VERSION}/")
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Docker image ${IMAGE_NAME}:${APP_VERSION} does not exist on Docker Hub."
            exit 1
          else
            echo "Docker image ${IMAGE_NAME}:${APP_VERSION} exists on Docker Hub."
          fi
  tests-kestra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup ASDF
        run: |
          echo "" > .tool-versions
          echo "helm 3.12.3" >> .tool-versions
          echo "kubeconform 0.7.0" >> .tool-versions
      - name: Set up ASDF
        uses: asdf-vm/actions/install@v4
      - name: Run tests
        run: |
          helm template charts/kestra -f charts/kestra/values-testing.yaml --validate=false > output.yaml
          kubeconform -strict -summary output.yaml
      # because of a recent bug we disable this part
      # helm-unittest/helm-unittest#790
      # - name: Run unittests
      #   run: |
      #     helm plugin install https://github.com/helm-unittest/helm-unittest.git
      #     helm unittest charts/kestra
  tests-kestra-starter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup ASDF
        run: |
          echo "" > .tool-versions
          echo "helm 3.12.3" >> .tool-versions
          echo "kubeconform 0.7.0" >> .tool-versions
      - name: Set up ASDF
        uses: asdf-vm/actions/install@v4
      - name: Run tests
        run: |
          # Package local kestra chart and serve via HTTP so helm dep up resolves
          # it without needing the version published to helm.kestra.io yet
          helm package charts/kestra --destination /tmp/kestra-pkg/
          helm repo index /tmp/kestra-pkg/
          python3 -m http.server 8879 --directory /tmp/kestra-pkg/ &
          helm repo add local-kestra http://127.0.0.1:8879 --force-update
          sed -i 's|repository: https://helm.kestra.io/|repository: http://127.0.0.1:8879|' charts/kestra-starter/Chart.yaml
          helm dep up charts/kestra-starter/
          helm template charts/kestra-starter --validate=false > output.yaml
          kubeconform -strict -summary output.yaml
